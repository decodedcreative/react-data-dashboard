name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: react_data_dashboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d react_data_dashboard"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/react_data_dashboard?schema=public
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify Vercel deployment contract
        run: npm run verify:vercel-config

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:run

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: react_data_dashboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d react_data_dashboard"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/react_data_dashboard?schema=public
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify Vercel deployment contract
        run: npm run verify:vercel-config

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npm run db:seed

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: npm run test:e2e:install:ci

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14

      # Upload archives; --exit-zero-on-changes avoids failing this job while Chromatic review is pending.
      # Enable Chromatic’s GitHub integration and require its check to block merges until UI is approved.
      # Skip publish when token is unset (fork PRs / local forks of CI semantics) — check in shell;
      # GitHub forbids reliably branching on secrets in step `if:` expressions.
      - name: Publish to Chromatic (Playwright archives)
        run: |
          if [ -z "${CHROMATIC_PROJECT_TOKEN:-}" ]; then
            echo 'CHROMATIC_PROJECT_TOKEN not set; skipping Chromatic publish.'
            exit 0
          fi
          npm run chromatic:e2e:ci
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          CHROMATIC_ARCHIVE_LOCATION: ./test-results
